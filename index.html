<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Livros - Biblioteca</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-primary: #2563eb;
      --color-primary-light: #3b82f6;
      --color-bg-dark: #1f2937;
      --color-bg-light: #f9fafb;
      --color-bg-white: #ffffff;
      --color-text-dark: #111827;
      --color-text-light: #6b7280;
      --color-text-lighter: #9ca3af;
      --color-border: #e5e7eb;
      --color-success: #10b981;
      --color-danger: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: var(--color-bg-light);
      color: var(--color-text-dark);
      line-height: 1.6;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
      background: var(--color-bg-light);
    }

    .sidebar {
      width: 240px;
      background: var(--color-bg-white);
      border-right: 1px solid var(--color-border);
      padding: 20px 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      max-height: 100vh;
    }

    .sidebar-logo {
      padding: 0 20px 30px;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 20px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text-dark);
    }

    .logo-subtitle {
      font-size: 12px;
      color: var(--color-text-light);
      margin-top: 4px;
    }

    .nav-item {
      padding: 12px 20px;
      margin: 0 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--color-text-light);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      border: none;
      background: none;
      text-align: left;
      width: calc(100% - 16px);
    }

    .nav-item:hover {
      background: var(--color-bg-light);
      color: var(--color-text-dark);
    }

    .nav-item.active {
      background: #dbeafe;
      color: var(--color-primary);
      font-weight: 500;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: var(--color-bg-white);
      border-bottom: 1px solid var(--color-border);
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--color-text-dark);
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .header-actions button {
      padding: 8px 16px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-white);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-dark);
      transition: all 0.2s;
    }

    .header-actions button:hover {
      background: var(--color-bg-light);
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--color-bg-white);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--color-primary);
    }

    .stat-label {
      font-size: 12px;
      color: var(--color-text-light);
      margin-top: 8px;
    }

    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      font-size: 14px;
      background: var(--color-bg-white);
      color: var(--color-text-dark);
    }

    .search-bar input::placeholder {
      color: var(--color-text-lighter);
    }

    .search-bar input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .filter-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .tag {
      padding: 6px 12px;
      background: var(--color-bg-white);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--color-text-light);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag:hover {
      border-color: var(--color-primary);
      background: #dbeafe;
    }

    .tag.active {
      background: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .book-card {
      background: var(--color-bg-white);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .book-card:hover {
      border-color: var(--color-primary);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .book-cover {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #e0e7ff 0%, #dbeafe 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 64px;
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .book-info {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .book-title {
      font-weight: 600;
      font-size: 15px;
      color: var(--color-text-dark);
      margin-bottom: 4px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-author {
      font-size: 12px;
      color: var(--color-text-light);
      margin-bottom: 10px;
    }

    .book-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .book-category {
      background: #dbeafe;
      color: var(--color-primary);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }

    .book-exemplares {
      font-size: 13px;
      color: var(--color-success);
      font-weight: 600;
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid var(--color-border);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-light);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--color-bg-white);
      border-radius: 8px;
      padding: 30px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 24px;
      cursor: pointer;
      color: var(--color-text-light);
      background: none;
      border: none;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      color: var(--color-text-dark);
    }

    .modal-header {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--color-text-dark);
      padding-right: 40px;
    }

    .modal-body {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .modal-cover {
      flex-shrink: 0;
      width: 120px;
      height: 160px;
      background: linear-gradient(135deg, #e0e7ff 0%, #dbeafe 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 48px;
    }

    .modal-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-info {
      flex: 1;
    }

    .modal-field {
      margin-bottom: 16px;
    }

    .modal-label {
      font-size: 12px;
      color: var(--color-text-light);
      font-weight: 600;
      margin-bottom: 4px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-value {
      font-size: 14px;
      color: var(--color-text-dark);
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      border-top: 1px solid var(--color-border);
      padding-top: 20px;
    }

    button {
      padding: 10px 16px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-white);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-dark);
      transition: all 0.2s;
    }

    button:hover {
      background: var(--color-bg-light);
    }

    button.primary {
      background: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }

    button.primary:hover {
      background: var(--color-primary-light);
    }

    button.danger {
      color: var(--color-danger);
      border-color: #fecaca;
    }

    button.danger:hover {
      background: #fee2e2;
    }

    .form-section {
      background: var(--color-bg-white);
      padding: 30px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      max-width: 600px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--color-text-dark);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      font-size: 14px;
      color: var(--color-text-dark);
      background: var(--color-bg-white);
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .relatorio-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border);
    }

    .relatorio-item:last-child {
      border-bottom: none;
    }

    .relatorio-item-value {
      font-weight: 600;
      color: var(--color-primary);
    }

    .relatorio-item.escasso .relatorio-item-value {
      color: var(--color-danger);
    }

    .no-data {
      text-align: center;
      padding: 20px;
      color: var(--color-text-light);
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        max-height: auto;
        position: static;
        flex-direction: row;
        overflow-x: auto;
        padding: 10px 0;
        border-right: none;
        border-bottom: 1px solid var(--color-border);
      }

      .sidebar-logo {
        padding: 0 20px;
        border-bottom: none;
        margin-bottom: 0;
        white-space: nowrap;
        border-right: 1px solid var(--color-border);
      }

      .nav-item {
        margin: 0;
        width: auto;
        padding: 10px 16px;
        border-radius: 0;
      }

      .books-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }

      .modal-body {
        flex-direction: column;
      }

      .header {
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
      }

      .header-actions {
        width: 100%;
      }

      .header-actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">📚 Biblioteca</div>
      <div class="logo-subtitle">Catálogo de Livros</div>
    </div>
    <button class="nav-item active" onclick="switchTab('consulta')">
      <span>🔍</span>
      <span>Consultar</span>
    </button>
    <button class="nav-item" onclick="switchTab('adicionar')">
      <span>➕</span>
      <span>Adicionar</span>
    </button>
    <button class="nav-item" onclick="switchTab('relatorios')">
      <span>📊</span>
      <span>Relatórios</span>
    </button>
  </div>

  <div class="main-content">
    <div class="header">
      <div class="header-title" id="pageTitle">Consultar Livros</div>
      <div class="header-actions">
        <button onclick="exportarDados()">📥 Exportar</button>
        <button onclick="atualizarPagina()">🔄 Atualizar</button>
      </div>
    </div>

    <div class="content-area">
      <!-- ABA CONSULTA -->
      <div id="tab-consulta" class="tab-content active">
        <div class="stats">
          <div class="stat-card">
            <div class="stat-value" id="totalLivros">0</div>
            <div class="stat-label">Total de livros</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="totalExemplares">0</div>
            <div class="stat-label">Exemplares</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="totalCategorias">0</div>
            <div class="stat-label">Categorias</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="livrosIndisponiveis">0</div>
            <div class="stat-label">Indisponíveis</div>
          </div>
        </div>

        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Buscar por título, autor ou resumo..." oninput="filtrarLivros()">
        </div>

        <div class="filter-tags" id="filterTags"></div>

        <div id="booksContainer" class="books-grid"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
          <div class="empty-state-icon">📖</div>
          <p>Nenhum livro encontrado</p>
        </div>
      </div>

      <!-- ABA ADICIONAR -->
      <div id="tab-adicionar" class="tab-content">
        <div class="form-section">
          <h2 style="margin-bottom: 20px; color: var(--color-text-dark); font-size: 18px;">Adicionar novo livro</h2>
          <form id="formAdicionar" onsubmit="adicionarLivro(event)">
            <div class="form-group">
              <label>Título do livro *</label>
              <input type="text" id="formTitulo" required placeholder="Ex: O Pequeno Príncipe">
            </div>

            <div class="form-group">
              <label>Autor *</label>
              <input type="text" id="formAutor" required placeholder="Ex: Antoine de Saint-Exupéry">
            </div>

            <div class="form-group">
              <label>Editora</label>
              <input type="text" id="formEditora" placeholder="Ex: Rocco">
            </div>

            <div class="form-group">
              <label>Categoria *</label>
              <select id="formCategoria" required>
                <option value="">Escolha uma categoria</option>
                <option value="Animais">Animais</option>
                <option value="Fantasia">Fantasia</option>
                <option value="Aventura">Aventura</option>
                <option value="Natureza">Natureza</option>
                <option value="Mistério">Mistério</option>
                <option value="Humor">Humor</option>
                <option value="Educativo">Educativo</option>
                <option value="Clássico">Clássico</option>
                <option value="Amizade">Amizade</option>
                <option value="Família">Família</option>
              </select>
            </div>

            <div class="form-group">
              <label>Exemplares disponíveis *</label>
              <input type="number" id="formExemplares" required min="0" placeholder="0">
            </div>

            <div class="form-group">
              <label>Resumo</label>
              <textarea id="formResumo" placeholder="Uma breve descrição do livro..."></textarea>
            </div>

            <div class="form-group">
              <label>URL da capa (link da imagem)</label>
              <input type="url" id="formFoto" placeholder="https://exemplo.com/capa.jpg">
            </div>

            <div class="form-actions">
              <button type="submit" class="primary" style="flex: 1;">✅ Salvar livro</button>
              <button type="reset">Limpar</button>
            </div>
          </form>
        </div>
      </div>

      <!-- ABA RELATORIOS -->
      <div id="tab-relatorios" class="tab-content">
        <div style="max-width: 600px;">
          <div style="background: var(--color-bg-white); padding: 30px; border-radius: 8px; border: 1px solid var(--color-border); margin-bottom: 20px;">
            <h2 style="margin-bottom: 20px; color: var(--color-text-dark); font-size: 18px;">Livros por Categoria</h2>
            <div id="relatorioCategoria">
              <div class="no-data">Nenhum livro cadastrado ainda</div>
            </div>
          </div>

          <div style="background: var(--color-bg-white); padding: 30px; border-radius: 8px; border: 1px solid var(--color-border);">
            <h2 style="margin-bottom: 20px; color: var(--color-text-dark); font-size: 18px;">Livros com poucas cópias</h2>
            <div id="relatorioEscassos">
              <div class="no-data">Nenhum livro com poucas cópias</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL DE DETALHES -->
<div id="modal" class="modal" onclick="fecharModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="fecharModal()">✕</button>
    <div class="modal-header" id="modalTitulo"></div>
    <div class="modal-body">
      <div class="modal-cover" id="modalCapa"></div>
      <div class="modal-info" id="modalInfo"></div>
    </div>
    <div class="modal-actions">
      <button onclick="fecharModal()" style="flex: 1;">Fechar</button>
      <button class="primary" onclick="editarLivro()" style="flex: 1;">✏️ Editar</button>
      <button class="danger" onclick="deletarLivro()" style="flex: 1;">🗑️ Deletar</button>
    </div>
  </div>
</div>

<script>
let livros = [];
let livroSelecionado = null;

function carregarDados() {
  const dados = localStorage.getItem('cataloLivros');
  if (dados) {
    livros = JSON.parse(dados);
  }
  renderizar();
  atualizarStats();
  atualizarFiltros();
}

function salvarDados() {
  localStorage.setItem('cataloLivros', JSON.stringify(livros));
}

function adicionarLivro(e) {
  e.preventDefault();
  
  const novoLivro = {
    id: Date.now(),
    titulo: document.getElementById('formTitulo').value,
    autor: document.getElementById('formAutor').value,
    editora: document.getElementById('formEditora').value,
    categoria: document.getElementById('formCategoria').value,
    exemplares: parseInt(document.getElementById('formExemplares').value),
    resumo: document.getElementById('formResumo').value,
    foto: document.getElementById('formFoto').value,
    dataCriacao: new Date().toLocaleDateString('pt-BR')
  };

  livros.push(novoLivro);
  salvarDados();
  document.getElementById('formAdicionar').reset();
  switchTab('consulta');
  renderizar();
  atualizarStats();
  atualizarFiltros();
  alert('✅ Livro adicionado com sucesso!');
}

function filtrarLivros() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const activeTags = Array.from(document.querySelectorAll('.tag.active')).map(t => t.textContent.trim());
  
  const filtrados = livros.filter(livro => {
    const matchSearch = 
      livro.titulo.toLowerCase().includes(search) ||
      livro.autor.toLowerCase().includes(search) ||
      livro.resumo.toLowerCase().includes(search);
    
    const matchTag = activeTags.length === 0 || activeTags.includes(livro.categoria);
    
    return matchSearch && matchTag;
  });

  renderizar(filtrados);
  document.getElementById('emptyState').style.display = filtrados.length === 0 ? 'block' : 'none';
}

function atualizarFiltros() {
  const categorias = [...new Set(livros.map(l => l.categoria))].sort();
  const container = document.getElementById('filterTags');
  
  container.innerHTML = categorias.map(cat => 
    `<div class="tag" onclick="this.classList.toggle('active'); filtrarLivros();">${cat}</div>`
  ).join('');
}

function atualizarStats() {
  const totalLivros = livros.length;
  const totalExemplares = livros.reduce((sum, l) => sum + l.exemplares, 0);
  const totalCategorias = new Set(livros.map(l => l.categoria)).size;
  const indisponiveis = livros.filter(l => l.exemplares === 0).length;

  document.getElementById('totalLivros').textContent = totalLivros;
  document.getElementById('totalExemplares').textContent = totalExemplares;
  document.getElementById('totalCategorias').textContent = totalCategorias;
  document.getElementById('livrosIndisponiveis').textContent = indisponiveis;

  gerarRelatorios();
}

function renderizar(livrosParaMostrar = livros) {
  const container = document.getElementById('booksContainer');
  
  if (livrosParaMostrar.length === 0) {
    container.innerHTML = '';
    return;
  }

  container.innerHTML = livrosParaMostrar.map(livro => `
    <div class="book-card" onclick="abrirModal(${livro.id})">
      <div class="book-cover">
        ${livro.foto ? `<img src="${livro.foto}" alt="${livro.titulo}" onerror="this.style.display='none'">` : '📚'}
      </div>
      <div class="book-info">
        <div class="book-title">${livro.titulo}</div>
        <div class="book-author">${livro.autor}</div>
        <div class="book-meta">
          <div class="book-category">${livro.categoria}</div>
        </div>
        <div class="book-exemplares">
          ${livro.exemplares} exemplar${livro.exemplares !== 1 ? 'es' : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function abrirModal(id) {
  livroSelecionado = livros.find(l => l.id === id);
  if (!livroSelecionado) return;

  document.getElementById('modalTitulo').textContent = livroSelecionado.titulo;
  
  const capa = document.getElementById('modalCapa');
  capa.innerHTML = livroSelecionado.foto 
    ? `<img src="${livroSelecionado.foto}" alt="${livroSelecionado.titulo}" onerror="this.style.display='none'">`
    : '📚';

  const info = document.getElementById('modalInfo');
  info.innerHTML = `
    <div class="modal-field">
      <span class="modal-label">Autor</span>
      <div class="modal-value">${livroSelecionado.autor}</div>
    </div>
    <div class="modal-field">
      <span class="modal-label">Editora</span>
      <div class="modal-value">${livroSelecionado.editora || '—'}</div>
    </div>
    <div class="modal-field">
      <span class="modal-label">Categoria</span>
      <div class="modal-value">${livroSelecionado.categoria}</div>
    </div>
    <div class="modal-field">
      <span class="modal-label">Exemplares</span>
      <div class="modal-value" style="font-weight: 600;">${livroSelecionado.exemplares}</div>
    </div>
    <div class="modal-field">
      <span class="modal-label">Resumo</span>
      <div class="modal-value">${livroSelecionado.resumo || '—'}</div>
    </div>
    <div class="modal-field">
      <span class="modal-label">Adicionado em</span>
      <div class="modal-value">${livroSelecionado.dataCriacao}</div>
    </div>
  `;

  document.getElementById('modal').classList.add('active');
}

function fecharModal(event) {
  if (event && event.target.id !== 'modal') return;
  document.getElementById('modal').classList.remove('active');
  livroSelecionado = null;
}

function deletarLivro() {
  if (!livroSelecionado) return;
  if (confirm(`Tem certeza que deseja deletar "${livroSelecionado.titulo}"?`)) {
    livros = livros.filter(l => l.id !== livroSelecionado.id);
    salvarDados();
    fecharModal();
    renderizar();
    atualizarStats();
    atualizarFiltros();
    alert('✅ Livro deletado!');
  }
}

function editarLivro() {
  if (!livroSelecionado) return;
  document.getElementById('formTitulo').value = livroSelecionado.titulo;
  document.getElementById('formAutor').value = livroSelecionado.autor;
  document.getElementById('formEditora').value = livroSelecionado.editora;
  document.getElementById('formCategoria').value = livroSelecionado.categoria;
  document.getElementById('formExemplares').value = livroSelecionado.exemplares;
  document.getElementById('formResumo').value = livroSelecionado.resumo;
  document.getElementById('formFoto').value = livroSelecionado.foto;
  
  livros = livros.filter(l => l.id !== livroSelecionado.id);
  salvarDados();
  fecharModal();
  switchTab('adicionar');
}

function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tabName).classList.add('active');
  
  const titles = {
    consulta: 'Consultar Livros',
    adicionar: 'Adicionar Livro',
    relatorios: 'Relatórios'
  };
  document.getElementById('pageTitle').textContent = titles[tabName];
  
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.target.classList.add('active');
}

function gerarRelatorios() {
  const porCategoria = {};
  livros.forEach(l => {
    if (!porCategoria[l.categoria]) porCategoria[l.categoria] = 0;
    porCategoria[l.categoria]++;
  });

  let html = '';
  if (Object.keys(porCategoria).length === 0) {
    html = '<div class="no-data">Nenhum livro cadastrado ainda</div>';
  } else {
    Object.entries(porCategoria).sort((a, b) => b[1] - a[1]).forEach(([cat, count]) => {
      html += `<div class="relatorio-item">
        <span>${cat}</span>
        <span class="relatorio-item-value">${count} livro${count !== 1 ? 's' : ''}</span>
      </div>`;
    });
  }
  document.getElementById('relatorioCategoria').innerHTML = html;

  const escassos = livros.filter(l => l.exemplares < 3).sort((a, b) => a.exemplares - b.exemplares);
  let htmlEscassos = '';
  if (escassos.length === 0) {
    htmlEscassos = '<div class="no-data">Nenhum livro com poucas cópias</div>';
  } else {
    escassos.forEach(l => {
      htmlEscassos += `<div class="relatorio-item escasso">
        <span>${l.titulo}</span>
        <span class="relatorio-item-value">${l.exemplares}</span>
      </div>`;
    });
  }
  document.getElementById('relatorioEscassos').innerHTML = htmlEscassos;
}

function exportarDados() {
  const csv = 'Título,Autor,Editora,Categoria,Exemplares,Resumo\n' + 
    livros.map(l => `"${l.titulo.replace(/"/g, '""')}","${l.autor.replace(/"/g, '""')}","${l.editora.replace(/"/g, '""')}","${l.categoria}",${l.exemplares},"${l.resumo.replace(/"/g, '""')}"`).join('\n');
  
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'catalogo_livros.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function atualizarPagina() {
  renderizar();
  atualizarStats();
  alert('✅ Atualizado!');
}

carregarDados();
</script>

</body>
</html>
